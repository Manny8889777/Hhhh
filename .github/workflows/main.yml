name: RDP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"   # runs every 5 hours

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create User
        run: |
          $password = "P@ssw0rd$(Get-Random)"
          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name "RDP" -Password $secure -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "USERNAME=RDP" >> $env:GITHUB_ENV
          echo "PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          $auth = "${{ secrets.TAILSCALE_AUTH_KEY }}"

          for ($i=0; $i -lt 5; $i++) {
            & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$auth --hostname=gh-rdp-$env:GITHUB_RUN_ID
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 10
          }

          Start-Sleep -Seconds 10
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          if (-not $ip) {
            Write-Error "No Tailscale IP"
            exit 1
          }

          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Show RDP Info
        run: |
          Write-Host "====== RDP DETAILS ======"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: $env:USERNAME"
          Write-Host "Pass: $env:PASSWORD"
          Write-Host "========================="

      - name: Keep Alive
        run: |
          for ($i=0; $i -lt 72; $i++) {
            Write-Host "Running... $(Get-Date)"
            Start-Sleep -Seconds 300
          }  - name: Maintain Connection  
    run: |  
      Write-Host "`n=== RDP ACCESS ==="  
      Write-Host "Address: $env:TAILSCALE_IP"  
      Write-Host "Username: RDP"  
      Write-Host "Password: $(echo $env:RDP_CREDS)"  
      Write-Host "==================`n"  
        
      # Keep runner active indefinitely (or until manually cancelled)  
      while ($true) {  
          Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"  
          Start-Sleep -Seconds 300  
      }


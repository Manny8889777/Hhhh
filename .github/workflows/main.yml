name: Stable RDP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

          netsh advfirewall firewall delete rule name="RDP" 2>$null
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

          Restart-Service TermService -Force

      - name: Create / Fix RDP User
        run: |
          Write-Host "Setting up user..."

          $password = "Rdp@123456!"   # FIXED PASSWORD (no confusion)

          # Force create/reset user
          net user RDP $password /add 2>$null
          net user RDP $password

          net localgroup Administrators RDP /add
          net localgroup "Remote Desktop Users" RDP /add

          # Disable password expiry
          wmic USERACCOUNT WHERE "Name='RDP'" SET PasswordExpires=FALSE

          echo "USERNAME=.\RDP" >> $env:GITHUB_ENV
          echo "PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          $auth = "${{ secrets.TAILSCALE_AUTH_KEY }}"

          if (-not $auth -or $auth -notlike "tskey-*") {
            Write-Error "Invalid Tailscale key!"
            exit 1
          }

          $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          for ($i=0; $i -lt 5; $i++) {
            & $exe up --authkey=$auth --hostname=gh-rdp-$env:GITHUB_RUN_ID

            if ($LASTEXITCODE -eq 0) { break }

            Start-Sleep -Seconds 10
          }

          Start-Sleep -Seconds 10
          $ip = & $exe ip -4

          if (-not $ip) {
            Write-Error "No IP"
            exit 1
          }

          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Show Details
        run: |
          Write-Host ""
          Write-Host "====== RDP READY ======"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: $env:USERNAME"
          Write-Host "Pass: $env:PASSWORD"
          Write-Host "======================="
          Write-Host ""

      - name: Keep Alive
        run: |
          for ($i=0; $i -lt 70; $i++) {
            Write-Host "Running $(Get-Date)"

            $svc = Get-Service TermService
            if ($svc.Status -ne "Running") {
              Restart-Service TermService -Force
            }

            Start-Sleep -Seconds 300
          }

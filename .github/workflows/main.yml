name: RDP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Write-Host "Enabling RDP..."

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 1

          # Remove old rule if exists
          netsh advfirewall firewall delete rule name="RDP" 2>$null

          # Add fresh rule
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create User
        run: |
          Write-Host "Creating RDP user..."

          $password = "Rdp@$(Get-Random)!"
          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          # Check if user exists
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
            Write-Host "User already exists, resetting password..."
            net user RDP $password
          } else {
            New-LocalUser -Name "RDP" -Password $secure -AccountNeverExpires
          }

          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue

          echo "USERNAME=RDP" >> $env:GITHUB_ENV
          echo "PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Write-Host "Installing Tailscale..."

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $file = "$env:TEMP\ts.msi"

          Invoke-WebRequest $url -OutFile $file
          Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          Write-Host "Connecting to Tailscale..."

          $auth = "${{ secrets.TAILSCALE_AUTH_KEY }}"

          if (-not $auth) {
            Write-Error "TAILSCALE_AUTH_KEY is missing!"
            exit 1
          }

          $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          for ($i=0; $i -lt 6; $i++) {
            & $exe up --authkey=$auth --hostname=gh-rdp-$env:GITHUB_RUN_ID

            if ($LASTEXITCODE -eq 0) {
              Write-Host "Tailscale Connected!"
              break
            }

            Write-Host "Retry $i..."
            Start-Sleep -Seconds 10
          }

          Start-Sleep -Seconds 10
          $ip = & $exe ip -4

          if (-not $ip) {
            Write-Error "Failed to get Tailscale IP"
            exit 1
          }

          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Verify RDP
        run: |
          Write-Host "Checking RDP connectivity..."

          $result = Test-NetConnection -ComputerName $env:TS_IP -Port 3389

          if (-not $result.TcpTestSucceeded) {
            Write-Error "RDP not reachable!"
            exit 1
          }

          Write-Host "RDP is working!"

      - name: Show Details
        run: |
          Write-Host ""
          Write-Host "====== RDP READY ======"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: $env:USERNAME"
          Write-Host "Pass: $env:PASSWORD"
          Write-Host "======================="
          Write-Host ""

      - name: Keep Alive
        run: |
          Write-Host "Keeping session alive..."

          for ($i=0; $i -lt 70; $i++) {
            Write-Host "[$(Get-Date)] Running..."

            # Ensure RDP service is alive
            $svc = Get-Service TermService
            if ($svc.Status -ne "Running") {
              Write-Host "Restarting RDP Service..."
              Restart-Service TermService -Force
            }

            Start-Sleep -Seconds 300
          }

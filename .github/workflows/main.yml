name:  RDP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Write-Host "Enabling RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

      - name: Create User
        run: |
          $password = "Admin@123456"
          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name "RDP"
          }

          New-LocalUser -Name "RDP" -Password $secure -PasswordNeverExpires -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "USERNAME=RDP" >> $env:GITHUB_ENV
          echo "PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $file = "$env:TEMP\ts.msi"

          Invoke-WebRequest $url -OutFile $file
          Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait

          Start-Sleep -Seconds 15

      - name: Connect Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if (-not $env:TAILSCALE_AUTH_KEY) {
            Write-Error "TAILSCALE_AUTH_KEY missing!"
            exit 1
          }

          $exe = "${env:ProgramFiles}\Tailscale\tailscale.exe"

          # Ensure service running
          Start-Service Tailscale -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 10

          for ($i=0; $i -lt 5; $i++) {
            Write-Host "Connecting attempt $($i+1)..."

            & $exe up --authkey="$env:TAILSCALE_AUTH_KEY" --hostname="gh-rdp-$env:GITHUB_RUN_ID" --accept-routes

            if ($LASTEXITCODE -eq 0) {
              Write-Host "Connected!"
              break
            }

            Start-Sleep -Seconds 10
          }

          $ip = & $exe ip -4

          if (-not $ip) {
            Write-Error "Failed to get Tailscale IP"
            exit 1
          }

          echo "TS_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "IP: $ip"

      - name: Show Details
        run: |
          Write-Host "=========================="
          Write-Host "RDP READY"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: $env:USERNAME"
          Write-Host "Pass: $env:PASSWORD"
          Write-Host "=========================="

      - name: Keep Alive
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $exe = "${env:ProgramFiles}\Tailscale\tailscale.exe"
          $end = (Get-Date).AddHours(6)

          while ((Get-Date) -lt $end) {

            # Keep RDP alive
            $svc = Get-Service TermService -ErrorAction SilentlyContinue
            if ($svc.Status -ne "Running") {
              Restart-Service TermService -Force
            }

            # Check Tailscale
            & $exe status | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Reconnecting Tailscale..."
              & $exe up --authkey="$env:TAILSCALE_AUTH_KEY" --hostname="gh-rdp-$env:GITHUB_RUN_ID"
            }

            Start-Sleep -Seconds 300
          }

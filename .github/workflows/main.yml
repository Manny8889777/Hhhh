name: Stable RDP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Write-Host "Enabling RDP..."

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

          netsh advfirewall firewall delete rule name="RDP" 2>$null
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

          Restart-Service TermService -Force

      - name: Create / Fix RDP User
        run: |
          Write-Host "Setting up user..."

          $username = "manny"
          $password = "manny@123456!"

          # Create or reset user
          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
              Write-Host "Creating user..."
              net user $username $password /add
          } else {
              Write-Host "Resetting password..."
              net user $username $password
          }

          # Add to groups safely
          net localgroup Administrators $username /add
          net localgroup "Remote Desktop Users" $username /add

          # Disable password expiry (NO wmic)
          Set-LocalUser -Name $username -PasswordNeverExpires $true

          echo "USERNAME=.\$username" >> $env:GITHUB_ENV
          echo "PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Write-Host "Installing Tailscale..."

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $file = "$env:TEMP\ts.msi"

          Invoke-WebRequest $url -OutFile $file
          Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          Write-Host "Connecting to Tailscale..."

          $auth = "${{ secrets.TAILSCALE_AUTH_KEY }}"

          if (-not $auth -or $auth -notlike "tskey-*") {
            Write-Error "Invalid Tailscale key!"
            exit 1
          }

          $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"

          for ($i=0; $i -lt 5; $i++) {
            & $exe up --authkey=$auth --hostname=gh-rdp-$env:GITHUB_RUN_ID

            if ($LASTEXITCODE -eq 0) {
              Write-Host "Connected!"
              break
            }

            Write-Host "Retrying..."
            Start-Sleep -Seconds 10
          }

          Start-Sleep -Seconds 10
          $ip = & $exe ip -4

          if (-not $ip) {
            Write-Error "Failed to get IP"
            exit 1
          }

          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Verify RDP
        run: |
          Write-Host "Checking RDP..."

          $result = Test-NetConnection -ComputerName $env:TS_IP -Port 3389

          if (-not $result.TcpTestSucceeded) {
            Write-Error "RDP not reachable"
            exit 1
          }

          Write-Host "RDP OK!"

      - name: Show Details
        run: |
          Write-Host ""
          Write-Host "====== RDP READY ======"
          Write-Host "IP: $env:TS_IP"
          Write-Host "User: $env:USERNAME"
          Write-Host "Pass: $env:PASSWORD"
          Write-Host "======================="
          Write-Host ""

      - name: Keep Alive
        run: |
          Write-Host "Keeping session alive..."

          for ($i=0; $i -lt 70; $i++) {
            Write-Host "Running $(Get-Date)"

            $svc = Get-Service TermService
            if ($svc.Status -ne "Running") {
              Write-Host "Restarting RDP Service..."
              Restart-Service TermService -Force
            }

            Start-Sleep -Seconds 300
          }
